<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-dark text-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          <h1 class="display-3 mb-3">RSS агрегатор</h1>
          <p class="lead">Начните читать RSS сегодня! Это легко, это красиво.</p>

          <!-- ❗ ВАЖНО: novalidate -->
          <form class="rss-form" novalidate>
            <div class="row">
              <div class="col">
                <div class="form-floating">
                  <input
                    id="url-input"
                    name="url"
                    type="text"
                    class="form-control"
                    placeholder="Ссылка RSS"
                  />
                  <label for="url-input">Ссылка RSS</label>
                </div>

                <div class="form-text">
                  Пример: https://lorem-rss.hexlet.app/feed
                </div>

                <p class="feedback m-0 small"></p>
              </div>

              <div class="col-auto">
                <button type="submit" class="btn btn-primary h-100 px-5">
                  Добавить
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <!-- Контент -->
      <div class="row mt-5">
        <div class="col-md-10 col-lg-8 mx-auto">
          <div class="row g-4">
            <!-- Посты -->
            <div class="col-md-6">
              <div class="card border-0">
                <div class="card-body">
                  <h2 class="card-title h4">Посты</h2>
                  <ul class="list-group border-0 posts"></ul>
                </div>
              </div>
            </div>

            <!-- Фиды -->
            <div class="col-md-6">
              <div class="card border-0">
                <div class="card-body">
                  <h2 class="card-title h4">Фиды</h2>
                  <ul class="list-group border-0 feeds"></ul>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- МОДАЛКА -->
    <div
      class="modal fade"
      id="modal"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"></h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body">
            <p></p>
          </div>

          <div class="modal-footer">
            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              class="btn btn-primary full-article"
            >
              Читать полностью
            </a>

            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Закрыть
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap JS (для модалки) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
