<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
  </head>
  <body>
    <div class="container-fluid p-5 bg-dark text-white">
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          <h1 class="display-3 mb-3">RSS агрегатор</h1>
          <p class="lead">Начните читать RSS сегодня! Это легко, это красиво.</p>

          <form class="rss-form text-body">
            <div class="row g-2">
              <div class="col-12 col-md-9">
                <label for="url-input" class="visually-hidden">Ссылка RSS</label>
                <input
                  id="url-input"
                  name="url"
                  type="text"
                  required
                  class="form-control form-control-lg"
                  placeholder="Ссылка RSS"
                  autofocus
                />
              </div>
              <div class="col-12 col-md-3">
                <button type="submit" class="btn btn-primary btn-lg w-100">
                  Добавить
                </button>
              </div>
            </div>

            <p class="mt-2 mb-0 text-white-50">
              Пример: https://lorem-rss.hexlet.app/feed
            </p>
            <div class="feedback mt-1 small"></div>
          </form>
        </div>
      </div>
    </div>

    <div class="container-fluid bg-light min-vh-100 py-5">
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          <div class="row">
            <div class="col-md-6 posts"></div>
            <div class="col-md-6 feeds"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
          </div>
          <div class="modal-body"></div>
          <div class="modal-footer">
            <a class="btn btn-primary full-article" href="#" target="_blank" rel="noopener noreferrer">Читать полностью</a>
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
