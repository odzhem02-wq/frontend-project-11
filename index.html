<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
  </head>
  <body class="bg-dark text-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
          <h1 class="display-3 mb-3">RSS агрегатор</h1>
          <p class="lead">Начните читать RSS сегодня! Это легко, это красиво.</p>

          <form class="rss-form" novalidate>
            <div class="row">
              <div class="col">
                <div class="form-floating">
              <input
                id="url-input"
                name="url"
                type="text"
                class="form-control"
                placeholder="Ссылка RSS"
                aria-label="url"
                />
                  <label for="url-input">Ссылка RSS</label>
                </div>

                <div class="form-text">
                  Пример: https://lorem-rss.hexlet.app/feed
                </div>

                <p class="feedback m-0 small"></p>
              </div>

              <div class="col-auto">
                <button type="submit" class="btn btn-primary h-100 px-5">
                  Добавить
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

      <div class="row mt-5">
        <div class="col-md-10 col-lg-8 mx-auto">
          <div class="row g-4">
            <div class="col-md-6">
              <div class="posts"></div>
            </div>

            <div class="col-md-6">
              <div class="feeds"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="modal fade" id="modal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"></h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Закрыть"
            ></button>
          </div>

          <div class="modal-body"></div>

          <div class="modal-footer">
            <a
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              class="btn btn-primary full-article"
            >
              Читать полностью
            </a>

            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Закрыть
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
