<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RSS агрегатор</title>
  </head>

  <body class="bg-dark text-light">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-12 col-lg-10">
          <h1 class="display-3 mb-3">RSS агрегатор</h1>
          <p class="lead mb-4">Начните читать RSS сегодня! Это легко, это красиво.</p>

          <form class="rss-form">
            <div class="row g-2 align-items-start">
              <div class="col-12 col-md-9">
                <label class="visually-hidden" for="url-input">Ссылка RSS</label>
                <input
                  id="url-input"
                  name="url"
                  type="text"
                  class="form-control form-control-lg"
                  placeholder="Ссылка RSS"
                  aria-label="Ссылка RSS"
                  autofocus
                />
                <div class="feedback text-danger mt-2"></div>
              </div>
              <div class="col-12 col-md-3">
                <button type="submit" class="btn btn-primary btn-lg w-100">Добавить</button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
